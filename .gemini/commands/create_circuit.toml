description = "レッドストーン回路の生成・検証"
prompt = """
以下の手順に従って、ユーザーのリクエストに基づいたレッドストーン回路を Minecraft 内で生成し、検証してください。
全ての `mc-cli` コマンドは、実行可能なバイナリへのパスがすでに通っているため、**そのまま実行してください。バイナリへのパスを使ったり、poetryなどを使って実行を試みないでください。**
よい例：`mc-cli test xor_20260101_120000.yaml`
悪い例：`./mc-cli/mc-cli test xor_20260101_120000.yaml`、`poetry run python3 mc-cli.py test xor_20260101_120000.yaml`
基本的にはSkillsを参照しますが、必要に応じて`search_web`ツールを使ってWebから情報を取得してください。この時、英語のほうが信頼できる情報が多いため、英語で検索してください。
ただし、**`mc-cli`コマンドを使用する際は必ずSkillsを参照してください。**特に引数が複雑であるため、無駄なコマンド実行を防ぐために、必ず引数のフォーマットを確認してから実行してください。
**思考するときはすべて英語を使い、ユーザーとのやり取りにのみ日本語を使ってください。**

### 制約事項 (重要)
- **アクセス範囲の制限**: 閲覧・アクセスして良いディレクトリは `.agents/` および **今回作成する** `temp/{name}_{datetime}/` のみに限定してください。ただし、知見まとめを書く際は `knowledges/` への書き込みも許可されます。
- **コマンドヘルプ**: `mc-cli`コマンドに関しては、`.agents/skills/mc_cli/`内の`SKILL.md`を確認してください。
- **出力形式**: `mc-cli` のデフォルト出力はトークン削減のためコンパクトな配列形式 `[ID, [X, Y, Z], {Properties}]` になっています。
- **書き込み制限**: **今回作成する** `temp/{name}_{datetime}/` および `knowledges/` ディレクトリ以下にファイルを生成する場合を除き、**絶対にファイルシステムへの書き込みを行わないでください。**
- **異常時の対応**: `mc-cli` の挙動がバグ（期待しないエラーや異常な動作）を示した場合は、**直ちに回路の生成を中断**し、ユーザーにバグの可能性を報告してください。

---

## 実行フロー

このワークフローは **2つの段階** に分かれており、各段階を専用のサブエージェントに委譲して実行します。
各段階のサブエージェントは独立した実行単位であり、**前の段階が完了してから次の段階を開始**してください。
サブエージェントへの指示は、このワークフロー全体のコンテキスト（制約事項・ユーザーの要望・前段階の結果）をすべて含めて渡してください。

---

### 段階A: 情報収集・要件定義 ( @circuit-researcher )

**この段階で実施すること**:
- ユーザーの要望確認
- 周辺ブロック情報の取得
- ユーザーの要件を自然言語で構造化

**サブエージェントへの指示に含めるべき情報**:
- ユーザーが要求した回路の種類・目的
- 設置する中心座標
- このワークフロー全体の制約事項

**サブエージェントが返すべき成果物**:
- `requirements`: 整理された自然言語での要件定義
- `terrain_summary`: 取得した周辺ブロック情報のサマリー
- `existing_blocks`: 既存ブロックの有無と座標
- `confirmation_needed`: ユーザーに確認が必要な事項

> **重要**: サブエージェントが成果物を返したら、内容を確認し、設置予定場所に既存ブロックがある場合は **必ずユーザーに確認を取ってから**段階Bに進んでください。

---

### 段階B: 設計・実装・テスト・修正 ( @circuit-builder )

**この段階で実施すること**:
- 回路の設計・論理構造の決定
- 土台ブロックの設置
- 回路 JSON の生成と保存
- テスト YAML の生成と実行
- テスト失敗時の修正（最大5回のリトライ）
- 知見のまとめ（`knowledges/` へ保存）
- 完了報告または失敗報告

**サブエージェントへの指示に含めるべき情報**:
- 段階Aで得られた全成果物（`requirements`, `terrain_summary`, `existing_blocks`, `confirmation_needed`）
- このワークフロー全体の制約事項

**サブエージェントが返すべき成果物**:
- `final_status`: `success` または `failure`
- `attempts`: 試行回数
- `placed_blocks_range`: 設置した座標範囲
- `knowledge_file_path`: 生成した知見ファイルのパス
- `report`: 成功時の報告内容、または失敗時の詳細な失敗分析

> **重要**: サブエージェントが返した結果を受け取ったら、成功・失敗に関わらずユーザーに最終報告を行ってください。

Request: {{args}}
"""
