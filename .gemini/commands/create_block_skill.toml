description = "文脈に応じたブロックスキルの作成"
prompt = """
指定された Minecraft Wiki 等のページから、特定のブロック（レッドストーンリピーター、コンパレータ、レバー等）の仕様を読み取り、エージェントが利用可能なスキルとして登録します。
**Java版を前提とし、それ以外のエディションの情報は一切記述しないでください。**

### 1. 情報源の指定
- ユーザーから対象となるブロックの解説ページ URL（例：Minecraft Wiki の「Redstone Repeater」のページ）を取得してください。

### 2. コンテンツの解析
- `read_url_content` を使用して、ページの内容を読み込んでください。
- 以下の情報を重点的に抽出してください：
    - **Block ID**: `minecraft:repeater` などの正確な内部 ID。
    - **Block States**: `facing`, `delay`, `powered`, `locked` などのプロパティ名とその取りうる値。
    - **設置ロジック**: プレイヤーの向きやクリックした場所によってどのように向きが決まるか。
    - **操作方法**: 右クリック（インタラクト）した際の挙動（例：遅延値の変化）。
    - **ブロックの機能・特性**: そのブロックがどのような機能や特性を持っているか。
    - **使用方法**: 回路の中でそのブロックはどのように使用されるか。
- クラフトに関する情報は不要です。
- 設置はプレイヤーによるものではなく、`.agents/skills/mc_cli/place_blocks/SKILL.md`を使用して行う前提で記述してください。
  - **クリックして設置することは絶対にできません。必ず`place_blocks`によって設置する方法を記述してください。**
  - やってはいけない例：「設置した際のプレイヤーの向きによってブロックの向きが決定される。」とプレイヤーが設置する前提で記述する。
  - よい例：「`facing`プロパティを用いてブロックの向きを指定する」と`place_blocks`を使う前提で記述する。
- 機能が全く同じで複数種類がある場合は代表的なもののみ記述すればよいです。
  - 例：ボタン、感圧版、ドアなどは各木材を使用したものが存在するが、すべて機能が同じであるためオークを記述し、それ以外は「その他各種木材のもの」としてまとめる。

### 3. スキルファイルの作成
- `.agents/skills/blocks/[block_name]/` ディレクトリを作成してください（例：`.agents/skills/blocks/repeater/`）。
- そのディレクトリ内に `SKILL.md` を作成し、以下の形式で内容を構成してください。
- 実装計画の作成は不要です。そのまま作成してください。

#### SKILL.md の構成例
```markdown
---
name: minecraft_block_[block_name]
description: [ブロック名]の特性、配置方法、および操作に関するガイドラインです。
---

# [ブロック名]の詳細仕様

## Block ID
- `minecraft:[block_id]`

## プロパティ (Block States)
- `facing`: [説明]
- `[property]`: [説明]

## 配置ガイドライン
- [設置時の向きや条件に関する説明]

## 操作 (Interaction)
- [レバーの切り替えやリピーターの遅延調整などの説明]

## 機能・特性
- [そのブロックが持っている機能や特性についての説明]

## 使用方法
- [回路の中でそのブロックを使用する場面や方法についての説明]
```

### 4. 完了報告
- スキルファイルが正しく生成されたことをユーザーに報告し、ワークフローを終了してください。
- 修正が必要な場合は、ユーザーからの指示を待って適宜対応してください。

Request: {{args}}
"""
