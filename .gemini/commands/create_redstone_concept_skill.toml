description = "文脈に応じたレッドストーン回路概念スキルの作成"
prompt = """
特定のレッドストーン回路の概念（例：Tフリップフロップ、マルチプレクサ、エッジディテクター等）について調査し、エージェントが利用可能なスキルとして登録します。
**Java版を前提とし、Minecraft Java Edition 26.1に基づいた情報を記述してください。**
**必ず`search_web`ツールを使用して確実な情報を取得してください。**

### 1. ターゲット概念の指定
- ユーザーから対象となるレッドストーン回路の概念名（例：「T Flip-Flop」、「RS Nor Latch」等）を取得してください。

### 2. Web検索による情報収集
- `search_web` を使用して、指定された概念について調査を行ってください。
- **必ず英語で検索してください。** 英語の情報の方が信頼性が高く、最新の技術仕様が反映されているためです。
- 検索クエリのベース：`Minecraft Java Edition 26.1 redstone [target_concept]`
  - 必要に応じて `mc 26.1` などに省略して検索の幅を広げてください。
- 以下の情報源を優先的に確認してください：
  - Minecraft Wiki (English)
  - Technical Minecraft communities (Reddit r/Redstone, specialized forums)
  - YouTube (信頼できるテクニカルレッドストーン実況者の動画等)

### 3. コンテンツの解析と整理
- 以下の情報を重点的に抽出してください：
  - **概念の定義**: その回路が論理的にどのような役割を果たすか。
  - **入出力の仕様**: どこが入力で、どこが出力か。信号の種類（パルス、持続、エッジ等）。
  - **最小構成とバリエーション**: 最もコンパクトな構成や、特定の用途向けのバリエーション。
  - **使用ブロック**: 構成に必要なブロックのリスト。
  - **Minecraft 26.1 (1.21+) 固有の仕様**: 銅の電球 (Copper Bulb) やクラフター (Crafter) を使用した最新の回路設計、あるいは仕様変更による影響。
  - **配置ガイドライン**: どの向きに設置すべきか、隣接するブロックとの干渉はあるか。
- このSkillsを読めばこの概念に関する回路を組めるぐらいの粒度で詳細に書いてください。

### 4. スキルファイルの作成
- `.agents/skills/concepts/[concept_slug]/` ディレクトリを作成してください。
- そのディレクトリ内に `SKILL.md` を作成し、以下の形式で構成してください。

#### SKILL.md の構成
```markdown
---
name: redstone_concept_[concept_name]
description: [概念名]の論理、構成方法、および使用に関するガイドラインです。
---

# [概念名] (English Name)

## 概要
[この概念がレッドストーン回路においてどのような役割を果たすかの説明]

## 仕様・論理
- **入力**: [説明]
- **出力**: [説明]
- **動作原理**: [簡潔な説明]

## 推奨レイアウト
[ブロックの配置図（可能であればASCIIアートや詳細な説明）]

### 必要な主要ブロック
- `minecraft:[block_id]`
- ...

## 26.1/1.21 における特記事項
- [最新バージョンでの利点や、銅の電球等を用いた効率化について]

## 使用ガイドライン
- [どのような回路に組み込むべきか、設置時の注意点等]

## ソース (References)
- [参照したURLの一覧]
```

### 5. 完了報告
- スキルファイルが正しく生成されたことをユーザーに報告し、ワークフローを終了してください。

Request: {{args}}
"""
